<!DOCTYPE html>
<html>
<head>
  <title>Parking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div>Available: <span id="available">0</span></div>
  <div>Occupied: <span id="occupied">0</span></div>
</div>

<div class="parking-container">

  <div class="exit-board">EXIT ↑</div>
  <div class="entry">ENTRY</div>

  <div class="parking-area">

    <div class="pillar">N1</div>
    <div class="pillar">N2</div>
    <div class="pillar">N3</div>
    <div class="pillar">N4</div>
    <div class="pillar">N5</div>

    <div class="slots" id="slots"></div>

  </div>

  <div class="arrow">➡️➡️</div>

</div>

<script src="script.js"></script>
</body>
</html>
